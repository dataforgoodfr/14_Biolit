name: pre-commit

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v4
      with:
        version: "0.11.25"
    - uses: actions/cache@v4
      with:
        path: ~/.cache/pre-commit
        key: pre-commit|${{ runner.os }}|${{ hashFiles('.pre-commit-config.yaml') }}
    - name: Install dependencies
      run: uv sync --frozen --directory backend
    - name: Run pre-commit hooks
      # no-commit-to-branch est un garde local (empêcher de commit sur main
      # depuis sa machine). En CI le checkout est sur main lors d'un push,
      # donc le hook échoue à tort : on l'ignore uniquement ici.
      env:
        SKIP: no-commit-to-branch
      run: uv run --directory backend --no-sync pre-commit run --all-files
    - name: Run unit tests
      run: uv run --directory backend --no-sync pytest -vv
