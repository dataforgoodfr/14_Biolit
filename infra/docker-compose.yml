
services:
  postgres:
    image: postgres:15
    container_name: biolit-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  label-studio:
    image: heartexlabs/label-studio:1.13.1
    container_name: biolit-label-studio
    ports:
      - "8089:8080"
    environment:
      LABEL_STUDIO_BASE_DATA_DIR: /label-studio/data
      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT: /label-studio/files
      LABEL_STUDIO_HOST: http://localhost:8089
      LABEL_STUDIO_INTERNAL_HOST: http://label-studio:8080
    volumes:
      - ../data/label-studio:/label-studio/data
      - ../data/label-studio/files:/label-studio/files:ro

  minio:
    image: minio/minio:latest
    container_name: biolit_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:

networks:
  default:
    name: biolit_network
